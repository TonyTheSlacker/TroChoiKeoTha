<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Phân Loại Thiết Bị</title>
    <style>
        /* CSS Variables cho Light/Dark Mode */
        :root {
            --bg-color: #f0f4f8;
            --text-color: #2c3e50;
            --box-bg: #ffffff;
            --box-border: #bdc3c7;
            --item-bg: #34495e;
            --item-text: #ffffff;
            --hover-bg: #e8f4fd;
            --hover-border: #3498db;
            --heading-color: #2980b9;
        }

        .dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --box-bg: #1e1e1e;
            --box-border: #333333;
            --item-bg: #2c3e50;
            --item-text: #e0e0e0;
            --hover-bg: #2a2a2a;
            --hover-border: #5dade2;
            --heading-color: #5dade2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            padding: 20px;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        h1 { 
            font-size: clamp(1.5rem, 4vw, 2rem);
        }

        /* Nút Dark Mode */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: transparent;
            border: 2px solid var(--text-color);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .game-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .drop-zone {
            width: 100%;
            max-width: 350px;
            min-height: 300px;
            background-color: var(--box-bg);
            border: 2px dashed var(--box-border);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            box-sizing: border-box;
            /* Khắc phục lỗi các box dính vào nhau */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px; 
        }

        .drop-zone.hover { 
            background-color: var(--hover-bg); 
            border-color: var(--hover-border); 
            transform: scale(1.02);
        }

        .drop-zone h3 {
            margin-top: 0;
            color: var(--heading-color);
            border-bottom: 2px solid var(--box-border);
            padding-bottom: 10px;
            width: 100%;
            transition: color 0.3s;
        }

        .item-pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background-color: var(--box-bg);
            border-radius: 10px;
            min-height: 80px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 0 auto;
            transition: background-color 0.3s;
        }

        .draggable-item {
            background-color: var(--item-bg);
            color: var(--item-text);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: grab;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            font-size: 1.1em;
            transition: transform 0.1s, opacity 0.2s, background-color 0.3s;
            width: 85%; /* Chiếm 85% chiều rộng của cột khi được thả vào */
            justify-content: flex-start;
        }
        
        /* Tách riêng cho pool để item không bị giãn dài ra khi nằm ở dưới */
        .item-pool .draggable-item {
            width: auto;
        }

        /* Làm icon bự hơn */
        .icon {
            font-size: 1.8em; 
            line-height: 1;
        }

        .draggable-item:active { cursor: grabbing; }
        .draggable-item.dragging {
            opacity: 0.5;
            transform: scale(1.05);
        }

        .correct { background-color: #27ae60 !important; color: white !important;}
        .incorrect { background-color: #c0392b !important; color: white !important;}
        
        .controls { 
            margin-top: 25px; 
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #2980b9; }
        .btn-reset { background-color: #7f8c8d; }
        .btn-reset:hover { background-color: #636e72; }
        
        #result-message {
            width: 100%;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .game-board { flex-direction: column; align-items: center; }
            .theme-toggle { position: static; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>

    <h1>Kéo Thả: Đâu là thiết bị thông minh?</h1>
    
    <div class="game-board">
        <div class="drop-zone" id="smart-zone">
            <h3>Thiết bị thông minh</h3>
        </div>
        
        <div class="drop-zone" id="non-smart-zone">
            <h3>Không là thiết bị thông minh</h3>
        </div>
    </div>

    <div class="item-pool" id="pool-zone">
        <div class="draggable-item" draggable="true" id="item1" data-type="smart"><span class="icon">📱</span> Smartphone</div>
        <div class="draggable-item" draggable="true" id="item2" data-type="smart"><span class="icon">💻</span> Máy tính bảng</div>
        <div class="draggable-item" draggable="true" id="item3" data-type="smart"><span class="icon">📹</span> Camera Internet</div>
        <div class="draggable-item" draggable="true" id="item4" data-type="smart"><span class="icon">⌚</span> Đồng hồ thông minh</div>
        <div class="draggable-item" draggable="true" id="item5" data-type="smart"><span class="icon">📺</span> Smart TV</div>
        
        <div class="draggable-item" draggable="true" id="item6" data-type="non-smart"><span class="icon">🕰️</span> Đồng hồ cơ học</div>
        <div class="draggable-item" draggable="true" id="item7" data-type="non-smart"><span class="icon">☎️</span> Điện thoại bàn cũ</div>
        <div class="draggable-item" draggable="true" id="item8" data-type="non-smart"><span class="icon">💡</span> Bóng đèn sợi đốt</div>
        <div class="draggable-item" draggable="true" id="item9" data-type="non-smart"><span class="icon">🧮</span> Bàn tính</div>
        <div class="draggable-item" draggable="true" id="item10" data-type="non-smart"><span class="icon">📻</span> Đài Radio Analog</div>
    </div>

    <div class="controls">
        <button onclick="checkAnswers()">Kiểm tra kết quả</button>
        <button onclick="resetGame()" class="btn-reset">Chơi lại</button>
        <div id="result-message"></div>
    </div>

    <script>
        // Xử lý Dark Mode
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.theme-toggle');
            if(document.body.classList.contains('dark-mode')) {
                btn.innerText = '☀️ Light Mode';
            } else {
                btn.innerText = '🌙 Dark Mode';
            }
        }

        const draggables = document.querySelectorAll('.draggable-item');
        const dropZones = document.querySelectorAll('.drop-zone, .item-pool');

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // Hệ thống âm thanh
        function playSound(type) {
            initAudio();
            if (type === 'pick') {
                playOscillator('sine', 600, 1000, 0.1, 0.2);
            } else if (type === 'drop') {
                playOscillator('triangle', 300, 150, 0.15, 0.2);
            } else if (type === 'cheer') {
                // Hợp âm chiến thắng (C Major Arpeggio)
                const notes = [523.25, 659.25, 783.99, 1046.50]; 
                notes.forEach((freq, index) => {
                    setTimeout(() => playOscillator('sine', freq, freq, 0.2, 0.3), index * 100);
                });
            } else if (type === 'sad') {
                // Âm thanh thất bại (Rớt tông)
                playOscillator('sawtooth', 300, 100, 0.6, 0.3);
            }
        }

        function playOscillator(type, startFreq, endFreq, duration, vol) {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.type = type;
            osc.frequency.setValueAtTime(startFreq, audioCtx.currentTime);
            if(startFreq !== endFreq) {
                osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + duration);
            }
            
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Logic Kéo Thả
        draggables.forEach(draggable => {
            draggable.addEventListener('dragstart', () => {
                playSound('pick');
                draggable.classList.add('dragging');
                draggable.classList.remove('correct', 'incorrect');
            });

            draggable.addEventListener('dragend', () => {
                draggable.classList.remove('dragging');
            });
        });

        dropZones.forEach(zone => {
            zone.addEventListener('dragover', e => {
                e.preventDefault();
                if(zone.classList.contains('drop-zone')) zone.classList.add('hover');
            });

            zone.addEventListener('dragleave', () => {
                zone.classList.remove('hover');
            });

            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('hover');
                const draggable = document.querySelector('.dragging');
                if (draggable) {
                    zone.appendChild(draggable);
                    playSound('drop');
                }
            });
        });

        function checkAnswers() {
            let allCorrect = true;
            let totalPlaced = 0;

            draggables.forEach(item => {
                const itemType = item.getAttribute('data-type');
                const parentId = item.parentElement.id;

                if (parentId === 'smart-zone' || parentId === 'non-smart-zone') {
                    totalPlaced++;
                    if ((itemType === 'smart' && parentId === 'smart-zone') || 
                        (itemType === 'non-smart' && parentId === 'non-smart-zone')) {
                        item.classList.add('correct');
                        item.classList.remove('incorrect');
                    } else {
                        item.classList.add('incorrect');
                        item.classList.remove('correct');
                        allCorrect = false;
                    }
                }
            });

            const resultMsg = document.getElementById('result-message');
            if (totalPlaced < 10) {
                resultMsg.style.color = '#e67e22';
                resultMsg.innerText = "Vui lòng phân loại tất cả các thiết bị trước khi kiểm tra!";
            } else if (allCorrect) {
                playSound('cheer');
                resultMsg.style.color = '#27ae60';
                resultMsg.innerText = "🎉 Tuyệt vời! Bạn đã phân loại chính xác hoàn toàn.";
            } else {
                playSound('sad');
                resultMsg.style.color = '#e74c3c';
                resultMsg.innerText = "Vẫn còn một vài thiết bị sai cột (màu đỏ). Hãy sắp xếp lại nhé!";
            }
        }

        function resetGame() {
            const pool = document.getElementById('pool-zone');
            draggables.forEach(item => {
                item.classList.remove('correct', 'incorrect');
                pool.appendChild(item);
            });
            document.getElementById('result-message').innerText = "";
        }
        
        document.body.addEventListener('click', initAudio, { once: true });
    </script>
</body>
</html>
